<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Randal's Restro Café</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/animations.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <!-- ================= HEADER ================= -->

    <header>

        <div class="logo-area">

            <img src="images/logo.png" alt="Randal's Restro Café">

            <div class="restaurant-details">

                <h1>Randal's Restro Café</h1>

                <p>Fresh • Crispy • Delicious</p>

            </div>

        </div>

    </header>

    <!-- ================= HERO ================= -->

    <section class="hero">

        <div class="hero-overlay">

            <h2>Welcome to Randal's Restro Café</h2>

            <p>Explore our delicious menu crafted with love ❤️</p>

        </div>

    </section>

    <!-- ================= SEARCH ================= -->

    <section class="search-box">

        <div class="search-wrapper">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input
                type="text"
                id="search"
                placeholder="Search your favourite food...">

        </div>

    </section>

    <!-- ================= CATEGORY BAR ================= -->

    <nav id="categoryBar">

        <!-- Categories generated by app.js -->

    </nav>

    <!-- ================= MENU ================= -->

    <main id="menuContainer">

        <!-- Menu generated by app.js -->

    </main>

    <!-- ================= LOADER ================= -->

    <div id="loader">

        <div class="spinner"></div>

    </div>

    <!-- ================= FOOTER ================= -->

    <footer>

        <img src="images/logo.png" alt="Logo">

        <h3>Randal's Restro Café</h3>

        <p>Thank you for visiting ❤️</p>

        <small>© 2026 Randal's Restro Café. All Rights Reserved.</small>

    </footer>

    <script src="js/app.js"></script>

</body>

</html>
